<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body{
            background: linear-gradient(120deg,#16325a,#191470);
            font-family: Arial, sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:white;
            padding:30px;
            border-radius:12px;
            width:320px;
            box-shadow:0 8px 25px rgba(0,0,0,0.3);
            text-align:center;
        }

        h2{
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:10px;
            margin:8px 0;
            border-radius:6px;
            border:1px solid #ccc;
        }

        button{
            width:100%;
            padding:10px;
            background:#0e1346;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#0f1645;
        }

        .error{
            color:rgb(204, 37, 37);
            margin-top:10px;
        }

        .links{
            margin-top:15px;
            display:flex;
            justify-content:space-between;
            font-size:14px;
        }

        a{
            text-decoration:none;
            color:#1d2671;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Login</h2>

    <form method="POST">

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">
            Login
        </button>

    </form>

    {% if error %}
        <div class="error">
            {{ error }}
        </div>
    {% endif %}

    <div class="links">
        <a href="{{ url_for('signup') }}">Create Account</a>
        <a href="{{ url_for('forgot') }}">Forgot Password?</a>
    </div>

</div>

</body>
</html>
