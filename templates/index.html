<!doctype html>
<html>
  <head>
    <title>AI Attendance Dashboard</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <style>
      /* Button Styling Upgrade */
      .buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        margin-top: 30px;
      }

      .buttons a {
        text-decoration: none;
      }

      .buttons button {
        background: linear-gradient(135deg, #ffd700, #ffb300);
        border: none;
        padding: 14px 28px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 10px;
        cursor: pointer;
        color: black;
        box-shadow: 0 4px 12px rgba(224, 5, 5, 0.3);
        transition: all 0.3s ease;
      }

      /* Hover Animation */
      .buttons button:hover {
        transform: translateY(-4px) scale(1.05);
        background: linear-gradient(135deg, #fff176, #ffc107);
        box-shadow: 0 8px 18px rgba(0,0,0,0.5);
      }

      /* Main content spacing */
      .main h1 {
        margin-bottom: 10px;
      }

      .main p {
        opacity: 0.9;
        font-size: 17px;
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <h2>AI Dashboard</h2>
      <ul>
        <li><a href="/register">Student Registration</a></li>
        <li><a href="/students">View Students</a></li>
        <li><a href="/attendance">Mark Attendance</a></li>
        <li><a href="/view-attendance">Attendance Details</a></li>
        <li><a href="/configure-camera">Camera Configuration</a></li>
      </ul>
    </div>

    <div class="main">
      <h1>AI-Powered Face Recognition Attendance</h1>
      <p>
        Register students, manage attendance, and integrate AI for seamless recognition.
      </p>

      <div class="buttons">
        <a href="/register"><button>Register Students</button></a>
        <a href="/students"><button>View Students</button></a>
        <a href="/attendance"><button>Mark Attendance</button></a>
        <a href="/view-attendance"><button>View Attendance</button></a>
        <a href="/configure-camera"><button>Camera Configuration</button></a>
      </div>
    </div>
  </body>
</html>
