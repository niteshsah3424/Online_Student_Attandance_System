<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body{
            background: linear-gradient(120deg,#0d1729,#1c265e);
            font-family: Arial, sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:white;
            padding:30px;
            border-radius:12px;
            width:320px;
            box-shadow:0 8px 25px rgba(0,0,0,0.3);
            text-align:center;
        }

        h2{
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:10px;
            margin:8px 0;
            border-radius:6px;
            border:1px solid #ccc;
        }

        button{
            width:100%;
            padding:10px;
            background:#243b55;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#141e30;
        }

        .msg{
            margin-top:10px;
            font-weight:bold;
            color:green;
        }

        .back{
            display:block;
            margin-top:15px;
            text-decoration:none;
            color:#243b55;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Forgot Password</h2>

    <form method="POST">

        <input type="text"
               name="username"
               placeholder="Enter Username"
               required>

        <input type="password"
               name="password"
               placeholder="New Password"
               required>

        <button type="submit">
            Reset Password
        </button>

    </form>

    {% if message %}
        <div class="msg">
            {{ message }}
        </div>
    {% endif %}

    <a href="{{ url_for('login') }}" class="back">
        ⬅ Back to Login
    </a>

</div>

</body>
</html>
