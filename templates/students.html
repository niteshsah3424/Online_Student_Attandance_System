<!DOCTYPE html>
<html>
<head>
    <title>Registered Students</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background-color: #243b55;
            color: white;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        img {
            border-radius: 8px;
            object-fit: cover;
        }

        .delete-btn {
            background-color: red;
            color: white;
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .delete-btn:hover {
            background-color: darkred;
        }

        .no-data {
            margin-top: 20px;
            font-weight: bold;
            color: red;
        }
    </style>
</head>

<body class="register-body">

<div class="register-container" style="width: 750px;">

    <h2>Registered Students</h2>

    {% if students|length == 0 %}
        <div class="no-data">
            No students registered yet!
        </div>

    {% else %}

    <table border="1">
        <tr>
            <th>Photo</th>
            <th>Name</th>
            <th>Roll No</th>
            <th>Action</th>
        </tr>

        {% for student in students %}
        <tr>
            <td>
                <img src="{{ url_for('static', filename='dataset/' + student[2]) }}"
                     width="60"
                     height="60">
            </td>

            <td>{{ student[1] }}</td>
            <td>{{ student[0] }}</td>

            <td>
                <button type="button"
                        class="delete-btn"
                        onclick="return confirm('Delete this student?')">
                    Delete
                </button>
            </td>
        </tr>
        {% endfor %}

    </table>
    {% endif %}

    <br>

    <a href="{{ url_for('home') }}" class="back-btn">
        ⬅ Back to Dashboard
    </a>

</div>

</body>
</html>
