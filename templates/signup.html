<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup</title>

    <style>
        body{
            margin:0;
            padding:0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#0f2027,#171739,#24367c);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:12px;
            width:350px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:10px;
            margin:8px 0;
            border-radius:8px;
            border:1px solid #ccc;
        }

        button{
            width:100%;
            padding:10px;
            background:#2c5364;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#203a43;
        }

        .link{
            text-align:center;
            margin-top:10px;
        }

        .link a{
            text-decoration:none;
            color:#2c5364;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Create Account</h2>

    <form method="POST" action="/signup">

        <input type="text" name="username" placeholder="Username" required>

        <input type="email" name="email" placeholder="Email" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Signup</button>

    </form>

    <div class="link">
        Already have account?
        <a href="/login">Login</a>
    </div>
</div>

</body>
</html>
